name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create config.js from secrets
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: |
          if [ -n "$MICROCMS_SERVICE_DOMAIN" ] && [ -n "$MICROCMS_API_KEY" ]; then
            cat > public/config.js <<EOF
          window.MICROCMS_CONFIG = {
            serviceDomain: "$MICROCMS_SERVICE_DOMAIN",
            apiKey: "$MICROCMS_API_KEY",
          };
          EOF
            echo "microCMS config.js を生成しました"
          else
            echo "microCMS 未設定 → posts.json をフォールバックとして使用します"
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: rie-utopia.com

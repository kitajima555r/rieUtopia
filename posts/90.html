            <h1>生きる力</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>&nbsp;</p>
            <p>生きる力はどこから出てくるのだろう</p>
            <p>ご飯を食べること？</p>
            <p>眠ること？</p>
            <p>お金を稼ぐこと？</p>
            <p>恋人と過ごすこと？</p>
            <p>家族を愛すること？</p>
            <p>&nbsp;</p>
            <p>私の生きる力は</p>
            <p>どのぐらいあるのだろう？</p>
            <p>&nbsp;</p>
            <p>疲れてしまった？</p>
            <p>足が擦り切れて血が出ている</p>
            <p>また歩き出せるまで…いまは休むの</p>
            <p>&nbsp;</p>
            <p>生きる力はきっと</p>
            <p>自分の中にある</p>
          </div>

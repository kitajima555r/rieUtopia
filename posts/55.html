            <h1>夜</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>夜が空から降りてきて</p>
            <p>みんなの夢の中にはいっていく</p>
            <p>つらかった出来事も</p>
            <p>嬉しかった出来事も</p>
            <p>夜が全部つつみこんで</p>
            <p>今日のうちに　砂糖菓子になる</p>
            <p>夢の住人が　食べに来る</p>
            <p>夜はまた　空にのぼって</p>
            <p>朝とハイタッチをかわしたら</p>
            <p>また来るねと行ってしまう</p>
          </div>

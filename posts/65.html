            <h1>曇り空</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>曇り空</p>
            <p>僕の心の中みたい</p>
            <p>重い水がたまってずっしりしてる</p>
            <p>この雨をぜんぶ落とせば</p>
            <p>軽くなって風にのっていけるだろうか</p>
            <p>&nbsp;</p>
            <p>僕のいた部屋には</p>
            <p>散らかった雑誌やゴミがある</p>
            <p>全部捨てたら</p>
            <p>軽くなって風になって</p>
            <p>飛んで行けるのだろうか</p>
            <p>&nbsp;</p>
            <p>曇り空　窓ガラス　湿度で濡れた</p>
            <p>また明日　こんどは晴れるかな</p>
          </div>

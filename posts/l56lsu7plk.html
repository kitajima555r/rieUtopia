            <h1>また明日会おうね</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>また明日会おうね</p>
            <p>大きな月のライトで甘いココアを飲んだら</p>
            <p>夢のソファに寝転んで</p>
            <p>くまさんを抱きしめて</p>
            <p>また明日会おうね</p>
            <p>お疲れさま</p>
            <p>ため息を全部お花に変えて</p>
            <p>そっと揺らすよ</p>
            <p>また明日会おうね</p>
            <p>今日を生きた証</p>
            <p>明日に繋げるよ</p>
            <p>&nbsp;</p>
            <p>おやすみなさい</p>
          </div>

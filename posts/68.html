            <h1>生きなくちゃ</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>まるで</p>
            <p>足が擦り切れたかのよう</p>
            <p>踏み出す一歩が　重くのしかかって</p>
            <p>傷が増える</p>
            <p>&nbsp;</p>
            <p>ここにいても</p>
            <p>空が狭いなら</p>
            <p>いっそ遠くへ行っても</p>
            <p>かまわないかな</p>
            <p>&nbsp;</p>
            <p>空いたお腹が</p>
            <p>時間を知らせる</p>
            <p>そうだ　食べなくちゃ</p>
            <p>&nbsp;</p>
            <p>生きなくちゃ　こんなでも</p>
          </div>

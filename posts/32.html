          <div class="poem-single-body">
            <p>そらに春がきた</p>
            <p>南風がふいている</p>
            <p>きれいに見える　ほしぞら</p>
            <p>冷え切った指先に花が咲いた</p>
            <p>&nbsp;</p>
            <p>そらに春がきた</p>
            <p>洗濯物ものが乾いている</p>
            <p>梅の花が　さくらのつぼみが</p>
            <p>花壇の菜の花が</p>
            <p>春を知らせている</p>
          </div>

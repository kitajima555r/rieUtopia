            <time datetime="2021-10-24">2021-10-24</time>
            <h1>楽しいをしよう</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>ぼくらは真面目に生きている</p>
            <p>それだけでも十分えらいこと</p>
            <p>だけど一度きりの人生</p>
            <p>楽しいことをしよう</p>
            <p>ただやつれるだけの毎日じゃ</p>
            <p>色褪せていってしまうから</p>
            <p>友達とお酒を飲んだり</p>
            <p>スーパー銭湯でのびのび過ごしたり</p>
            <p>家族で広い公園におでかけしたり</p>
            <p>ホテルに泊まって贅沢したり</p>
            <p>楽しい！って思うことしよう</p>
            <p>それはきっと宝物になる</p>
            <p>たくさんの楽しいで</p>
            <p>生きていこう</p>
          </div>

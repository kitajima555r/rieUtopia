            <h1>心の病</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>どうして心の病は</p>
            <p>僕らと世界をひきはなしてしまうのだろう</p>
            <p>道ゆく他人が</p>
            <p>僕を見ているような気がして</p>
            <p>僕の頭の中を透けて見ているような気がして</p>
            <p>恐ろしくて</p>
            <p>ただ　恐ろしくて</p>
            <p>&nbsp;</p>
            <p>それなのなら世界と僕の間には</p>
            <p>グレーのベールが存在している</p>
            <p>触れられないベールが僕と世界とを引き離している</p>
            <p>&nbsp;</p>
            <p>心の病は</p>
            <p>僕と世界を引き離してしまうんだ</p>
            <p>&nbsp;</p>
          </div>

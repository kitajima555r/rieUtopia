            <h1>不安だ</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>不安だ</p>
            <p>不安でも生きていかなきゃならないんだ</p>
            <p>なら不安に溺れたままでいいのか？</p>
            <p>生きやすい方法を探さないのか？</p>
            <p>いや生きやすい方法を探そう</p>
            <p>息をする方法を探そう</p>
            <p>泳ぐ方法を習得しよう</p>
            <p>水から出て陸にあがろう</p>
            <p>生きていくというのは</p>
            <p>そういうことなんじゃないのか</p>
            <p>だから不安になったら</p>
            <p>方法を見つけるんだ</p>
            <p>強さ弱さの問題じゃない</p>
            <p>生き抜く方法を見つけるんだ</p>
          </div>

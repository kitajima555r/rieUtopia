          <div class="poem-single-body">
            <p>おはよう</p>
            <p>おはよう</p>
            <p>今日はあたらしい1ページのはじまり</p>
            <p>まっさらな白いキャンバスに</p>
            <p>なにを描こう</p>
            <p>&nbsp;</p>
            <p>伸びをして</p>
            <p>整えよう</p>
            <p>&nbsp;</p>
            <p>憂鬱だった昨日も</p>
            <p>失敗した一昨日も</p>
            <p>ぜんぶぜんぶ関係ない</p>
            <p>&nbsp;</p>
            <p>今日はまだ  まっさらな1ページ</p>
            <p>&nbsp;</p>
            <p>元気よくはじめよう</p>
            <p>今日があることに感謝しよう</p>
            <p>&nbsp;</p>
            <p>今を生きることに</p>
            <p>一生懸命になろう</p>
          </div>

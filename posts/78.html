            <h1>晴れた空</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>晴れた空が好きだ</p>
            <p>なんて気持ちいいのだろう</p>
            <p>あの空のように私の心も</p>
            <p>澄み切ったらいいのに</p>
            <p>吸い込んだ空気が</p>
            <p>冬の街の匂いがしても</p>
            <p>私は空にはなれないまま生きている</p>
            <p>じたばたもがいて生きている</p>
            <p>向き合うのが難しいまま</p>
            <p>やり方もわからないまま</p>
            <p>晴れた空は</p>
            <p>そんな私を見つめている</p>
            <p>&nbsp;</p>
          </div>

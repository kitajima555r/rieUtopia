            <h1>鬱になる。</h1>
            <span class="poem-card-tag">生きる</span>
          </header>
          <div class="poem-single-body">
            <p>鬱になって2週間がすぎた。</p>
            <p>希死念慮が強く，薬を調節してもらった。</p>
            <p>親に頼って、なるべく寝る。休む。</p>
            <p>食欲もあまりない。</p>
            <p>&nbsp;</p>
            <p>午前はほとんど寝ている。</p>
            <p>午後になるとやっと洗濯を回せる。</p>
            <p>流しはごちゃごちゃ。</p>
            <p>部屋もぐちゃぐちゃ。</p>
            <p>気持ちはどん底。</p>
            <p>&nbsp;</p>
            <p>いつ鬱が終わるだろう。</p>
            <p>鬱と躁ならどっちがいいかな。</p>
          </div>

            <time datetime="2023-12-02">2023-12-02</time>
            <h1>散らかった部屋…片付かない…助けて</h1>
            <span class="poem-card-tag">生きる</span>
          </header>
          <div class="poem-single-body">
            <p>頭の中がゴチャゴチャしている。</p>
            <p>楽しいことが楽しくない。</p>
            <p>憂鬱な気分に覆われた世界。</p>
            <p>それが抑うつ状態。鬱期。</p>
            <p>からだは重い。感情がわかない。</p>
            <p>横になっているのに悶々とし続ける、休めていない。</p>
            <p>ため息を大きくつかないと、息が吸えてない。</p>
            <p>&nbsp;</p>
            <p>部屋はぐちゃぐちゃ。</p>
            <p>憂鬱。憂鬱。憂鬱。</p>
          </div>

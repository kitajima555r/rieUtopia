            <h1>自分は何者</h1>
            <span class="poem-card-tag">日記</span>
          </header>
          <div class="poem-single-body">
            <p>自分は何者なんだろう</p>
            <p>何が強みなんだろう</p>
            <p>何もしてないと不安で</p>
            <p>社会と繋がってないと不安で</p>
            <p>でも人と話すのは苦手で</p>
            <p>周りの人はちゃんと社会人してるように見えるのに</p>
            <p>わたしだけ置き去りになっている気がするのはなぜだろう</p>
            <p>わたしは何者なんだろう</p>
            <p>&nbsp;</p>

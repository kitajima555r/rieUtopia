            <time datetime="2026-07-04">2026-07-04</time>
            <h1>明日に希望を</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>明日に希望を</p>
            <p>たとえ空が曇っていても</p>
            <p>わずかな光で</p>
            <p>道は見えている</p>
            <p>一歩ずつ確かな</p>
            <p>歩みを踏みしめて</p>
            <p>わたしたちは進んでいる</p>
            <p>一日いちにちを生きている</p>
            <p>明日に希望を！</p>
            <p>胸に不安を抱えていても</p>
            <p>夜を超え</p>
            <p>また日が昇る</p>
            <p>雨が降っても！</p>
            <p>それを糧に</p>
            <p>また一歩を踏み出す</p>
            <p>明日に希望を！</p>
          </div>

          <div class="poem-single-body">
            <p>毎日がんばってるね</p>
            <p>おつかれさま</p>
            <p>&nbsp;</p>
            <p>ほっと  ひと息  やすみませんか</p>
            <p>伸びでもして</p>
            <p>空でも見て</p>
            <p>風に吹かれて</p>
            <p>コーヒー飲んで……</p>
            <p>&nbsp;</p>
            <p>また午後もあるから</p>
            <p>ぼーっとひととき</p>
            <p>やすみませんか</p>

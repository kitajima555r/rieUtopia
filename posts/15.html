            <h1>空が青くてさ</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>散歩に出かけたんだ</p>
            <p>空が青くてさ</p>
            <p>風が通り抜けていった</p>
            <p>水のせせらぎ</p>
            <p>木のざわめき</p>
            <p>心のもやもやがすうーっと</p>
            <p>流れていった</p>
            <p>あぁ　疲れていたんだなあって</p>
            <p>思ったよ</p>
            <p>ぼくは癒しを求めてたんだ</p>
            <p>また明日から歩き出せるかな</p>
          </div>

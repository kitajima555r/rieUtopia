          <div class="poem-single-body">
            <p>ブランドRIEを立ち上げる。青やピンクの雑貨等をデザインする。</p>
            <p>オフィス RIEを立ち上げる。ようは個人事業主でいいから社長になる。</p>
            <p>ステップRIEを立ち上げる。抑うつやうつ症状の人たちの自助グループみたいなのができればいいな。</p>
            <p>まずは自分の状態をよくするところから。一歩ずつ。</p>

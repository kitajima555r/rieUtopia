            <h1>僕のために</h1>
            <span class="poem-card-tag">詩</span>
          </header>
          <div class="poem-single-body">
            <p>僕は僕のために生きていこう</p>
            <p>自分のために時間を使い</p>
            <p>自分のためにお金を使い</p>
            <p>自分の幸せのために生きていこう</p>
            <p>家族のことを思い</p>
            <p>家族の幸せを願い</p>
            <p>僕の幸せとなる</p>
            <p>&nbsp;</p>
            <p>僕は僕をないがしろにしない</p>
            <p>自分のために生きていこう</p>
            <p>&nbsp;</p>
          </div>
